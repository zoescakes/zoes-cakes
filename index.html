<!DOCTYPE html>
<html>
<head>
<title>Zoe's Cakes</title>

<style>
body { font-family: Dancing moon script; background:#ffd6e7; margin:0; }
h1 { text-align:center; color:#ff4d94; }

.main { display:flex; height:95vh; }

.left { width:40%; padding:10px; overflow:auto; }
.right { width:60%; padding:10px; display:flex; flex-direction:column; gap:10px; }

.container { background:white; padding:15px; border-radius:20px; }

.cakes { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

img { width:100%; border-radius:15px; cursor:pointer; }

input, select {
width:95%;
padding:10px;
margin:5px;
border-radius:10px;
}

button {
padding:8px;
margin:3px;
background:#ff4d94;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.order {
background:#fff0f5;
padding:8px;
margin:5px;
border-radius:10px;
}
</style>
</head>

<body>

<h1>🎂 Zoe's Cakes</h1>

<div class="main">

<!-- LEFT -->
<div class="left container">
<h3>Choose Cake</h3>
<div class="cakes">

<div class="product">
<div class="badge">BEST SELLER</div>
<img src="drip.jpg" onclick="selectCake('Drip Cake')">
<h4>🍫 Drip Cake</h4>
</div>

<div class="product">
<div class="badge">NEW</div>
<img src="mini.jpg" onclick="selectCake('Mini Tiered')">
<h4>🧁 Mini Tiered</h4>
</div>

<div class="product">
<img src="tiered.jpg" onclick="selectCake('Tiered Cake')">
<h4>🎂 Tiered Cake</h4>
</div>

<div class="product">
<img src="cupcake.jpg" onclick="selectCake('With Cupcakes')">
<h4>🧁 Cupcake Set</h4>
</div>

<div class="product">
<img src="wedding.jpg" onclick="selectCake('Wedding Cake')">
<h4>💍 Wedding Cake</h4>
</div>

</div>

<!-- RIGHT -->
<div class="right">

<div class="container">
<h3>Order 💖</h3>

<input id="name" placeholder="Customer Name">
<input id="cake" placeholder="Cake Type" readonly>

<select id="size" onchange="autoPrice()">
<option value="">Size</option>
<option>Small</option>
<option>Medium</option>
<option>Large</option>
</select>

<input id="price" placeholder="Price" readonly>
<input id="date" type="date">

<select id="status">
<option>Pending</option>
<option>Paid</option>
<option>Claimed</option>
</select>

<h4>GCash: 09062070504</h4>

<button onclick="saveOrder()">Save Order</button>
<button onclick="printCurrent()">Print Receipt</button>

</div>

<div class="container">
<h3>Sales Tracker</h3>
<h4>Total Sales: ₱<span id="total">0</span></h4>
<div id="orders"></div>
</div>

</div>
</div>

<script>

function selectCake(type){
document.getElementById("cake").value = type;
autoPrice();
}

function autoPrice(){
let cake = document.getElementById("cake").value;
let size = document.getElementById("size").value;
let p = 0;

if(cake=="Drip Cake"){
if(size=="Small") p=380;
if(size=="Medium") p=580;
if(size=="Large") p=700;
}

if(cake=="With Cupcakes") p=1350;
if(cake=="Mini Tiered") p=2350;
if(cake=="Tiered Cake") p=2800;
if(cake=="Wedding Cake") p=3500;

document.getElementById("price").value = p;
}

function saveOrder(){
let name = document.getElementById("name").value;
let cake = document.getElementById("cake").value;
let price = document.getElementById("price").value;
let status = document.getElementById("status").value;

if(name=="" || cake=="" || price==""){
alert("Complete the order first!");
return;
}

let order = {name,cake,price,status};

let data = JSON.parse(localStorage.getItem("orders")) || [];
data.push(order);
localStorage.setItem("orders", JSON.stringify(data));

alert("Saved!");
showOrders();
}

function showOrders(){
let data = JSON.parse(localStorage.getItem("orders")) || [];
let html="";
let total=0;

data.forEach((o,i)=>{

if(o.status=="Paid"){
total += Number(o.price);
}

html += `
<div class="order">
${o.name} | ${o.cake} | ₱${o.price} | ${o.status}
<br>
<button onclick="markPaid(${i})">Paid</button>
<button onclick="markClaim(${i})">Claimed</button>
<button onclick="printOne(${i})">🧾</button>
<button onclick="deleteOrder(${i})">❌</button>
</div>`;
});

document.getElementById("orders").innerHTML = html;
document.getElementById("total").innerText = total;
}

function markPaid(i){
let data = JSON.parse(localStorage.getItem("orders"));
data[i].status="Paid";
localStorage.setItem("orders", JSON.stringify(data));
showOrders();
}

function markClaim(i){
let data = JSON.parse(localStorage.getItem("orders"));
data[i].status="Claimed";
localStorage.setItem("orders", JSON.stringify(data));
showOrders();
}

function deleteOrder(i){
let data = JSON.parse(localStorage.getItem("orders"));
data.splice(i,1);
localStorage.setItem("orders", JSON.stringify(data));
showOrders();
}

// PRINT CURRENT ORDER
function printCurrent(){
let name = document.getElementById("name").value;
let cake = document.getElementById("cake").value;
let price = document.getElementById("price").value;

let w = window.open("");
w.document.write(`
<h2>Zoe's Cakes</h2>
<p>${name}</p>
<p>${cake}</p>
<p>₱${price}</p>
<p>GCash: 09764183834</p>
`);
w.print();
}

// PRINT FROM LIST
function printOne(i){
let data = JSON.parse(localStorage.getItem("orders"));
let o = data[i];

let w = window.open("");
w.document.write(`
<h2>Zoe's Cakes</h2>
<p>${o.name}</p>
<p>${o.cake}</p>
<p>₱${o.price}</p>
<p>${o.status}</p>
<p>GCash: 09764183834</p>
`);
w.print();
}

showOrders();

</script>

</body>
</html>
