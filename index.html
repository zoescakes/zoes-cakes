<!DOCTYPE html>
<html>
<head>
  <title>Zoe's Cakes 🎂</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #ffe4ec;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #ff4da6;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }

    button {
      background: #ff4da6;
      color: white;
      border: none;
      cursor: pointer;
    }

    h2, h3 {
      margin-top: 20px;
    }

    .order {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      border-left: 5px solid #ff4da6;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<h1>Zoe's Cake Orders 🎂</h1>

<div class="box">
  <input id="name" placeholder="Customer Name">
  <input id="cake" placeholder="Cake Type">
  <input id="size" placeholder="Size">
  <input id="price" placeholder="Price">
  <input id="date" type="date">

  <select id="status">
    <option>Pending</option>
    <option>Paid</option>
    <option>Claimed</option>
  </select>

  <button onclick="addOrder()">Submit Order</button>
</div>

<h2>Orders</h2>
<h3>Total Income (Paid only): ₱<span id="total">0</span></h3>

<div id="orders"></div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCGJ_LtyRkZ3YzfxVIsfu2uQKQvhDOHSLg",
    authDomain: "zoes-cake-order-tracker.firebaseapp.com",
    projectId: "zoes-cake-order-tracker",
    storageBucket: "zoes-cake-order-tracker.firebasestorage.app",
    messagingSenderId: "123074129862",
    appId: "1:123074129862:web:58f5be0ed235691ec88cc7"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  function addOrder() {
    const name = document.getElementById("name").value;
    const cake = document.getElementById("cake").value;
    const size = document.getElementById("size").value;
    const price = document.getElementById("price").value;
    const date = document.getElementById("date").value;
    const status = document.getElementById("status").value;

    if (!name || !cake || !price) {
      alert("Please fill all important fields");
      return;
    }

    db.collection("orders").add({
      name, cake, size, price, date, status
    });
  }

  function deleteOrder(id) {
    db.collection("orders").doc(id).delete();
  }

  function printOrder(o) {
    const w = window.open('', '', 'width=300,height=400');
    w.document.write(`
      <h3>Zoe's Cakes</h3>
      <p>Name: ${o.name}</p>
      <p>Cake: ${o.cake}</p>
      <p>Size: ${o.size}</p>
      <p>Price: ₱${o.price}</p>
      <p>Status: ${o.status}</p>
      <p>Date: ${o.date}</p>
    `);
    w.print();
  }

  db.collection("orders").onSnapshot(snapshot => {
    const ordersDiv = document.getElementById("orders");
    ordersDiv.innerHTML = "";
    let total = 0;

    snapshot.forEach(doc => {
      const o = doc.data();

      if (o.status === "Paid") {
        total += Number(o.price);
      }

      ordersDiv.innerHTML += `
        <div class="order">
          <b>${o.name}</b><br>
          Cake: ${o.cake}<br>
          Size: ${o.size}<br>
          Price: ₱${o.price}<br>
          Date: ${o.date}<br>
          Status: <b>${o.status}</b><br><br>

          <button onclick="printOrder(${JSON.stringify(o)})">🧾 Print</button>
          <button onclick="deleteOrder('${doc.id}')">❌ Delete</button>
        </div>
      `;
    });

    document.getElementById("total").innerText = total;
  });
</script>

</body>
</html>
