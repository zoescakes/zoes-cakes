<!DOCTYPE html>
<html>
<head>
<title>Zoe's Cakes 🎂</title>

<style>
body { font-family: Arial; background: #ffe4ec; padding: 20px; }

h1 { text-align: center; color: #ff4da6; }

.container {
  max-width: 400px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 15px;
}

.card {
  background: #fff;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  border: 2px solid transparent;
}

.card:hover {
  border: 2px solid #ff4da6;
}

.card img {
  width: 100%;
  height: 100px;
  object-fit: cover;
}

.card p {
  text-align: center;
  font-size: 12px;
  padding: 5px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}

button {
  width: 100%;
  padding: 12px;
  background: #ff4da6;
  color: white;
  border: none;
  cursor: pointer;
}

.order {
  background: white;
  margin-top: 10px;
  padding: 10px;
  border-left: 5px solid pink;
}
</style>

</head>

<body>

<h1>Zoe's Cakes 🎂</h1>

<div class="container">

<input id="name" placeholder="Customer Name">

<!-- 🎂 CLICKABLE MENU -->
<div class="grid">

<div class="card" onclick="pick('small')">
<img src="https://i.imgur.com/8Km9tLL.jpg">
<p>Small ₱380</p>
</div>

<div class="card" onclick="pick('medium')">
<img src="https://i.imgur.com/5tj6S7O.jpg">
<p>Medium ₱580</p>
</div>

<div class="card" onclick="pick('large')">
<img src="https://i.imgur.com/Y3b7XQp.jpg">
<p>Large ₱700</p>
</div>

<div class="card" onclick="pick('rect')">
<img src="https://i.imgur.com/2DhmtJ4.jpg">
<p>Rect ₱850</p>
</div>

<div class="card" onclick="pick('pkg1')">
<img src="https://i.imgur.com/Fo3pXwK.jpg">
<p>1 Tier + Cupcake ₱1350</p>
</div>

<div class="card" onclick="pick('pkg2')">
<img src="https://i.imgur.com/7QZ5Y0P.jpg">
<p>Mini Tiered ₱2350</p>
</div>

<div class="card" onclick="pick('pkg3')">
<img src="https://i.imgur.com/3ZQ3Z8F.jpg">
<p>Standard Tier ₱2800</p>
</div>

</div>

<input id="cakeType" placeholder="Cake Type">
<input id="size" placeholder="Size">
<input id="price" placeholder="Price">

<input id="date" type="date">

<select id="status">
<option>Pending</option>
<option>Paid</option>
<option>Claimed</option>
</select>

<button onclick="addOrder()">✨ Submit Order</button>

</div>

<h2>🧁 Orders</h2>
<div id="orders"></div>

<script>

let orders = JSON.parse(localStorage.getItem("orders")) || [];

// 🎂 CLICK PICK
function pick(pkg) {

if (pkg === "small") {
cakeType.value = "Drip Cake";
size.value = "Small";
price.value = "380";
}

if (pkg === "medium") {
cakeType.value = "Drip Cake";
size.value = "Medium";
price.value = "580";
}

if (pkg === "large") {
cakeType.value = "Drip Cake";
size.value = "Large";
price.value = "700";
}

if (pkg === "rect") {
cakeType.value = "Rectangular Cake";
size.value = "8x12";
price.value = "850";
}

if (pkg === "pkg1") {
cakeType.value = "1 Tier Cake + 12 Cupcakes";
size.value = "6x4";
price.value = "1350";
}

if (pkg === "pkg2") {
cakeType.value = "Mini Tiered + 12 Cupcakes";
size.value = "7 & 5";
price.value = "2350";
}

if (pkg === "pkg3") {
cakeType.value = "Standard Tiered + 12 Cupcakes";
size.value = "8 & 6";
price.value = "2800";
}

}

// ➕ ADD ORDER
function addOrder() {
const order = {
id: "ZC-" + Date.now(),
name: name.value,
cakeType: cakeType.value,
size: size.value,
price: parseInt(price.value),
date: date.value,
status: status.value
};

orders.push(order);
localStorage.setItem("orders", JSON.stringify(orders));
displayOrders();
}

// ❌ DELETE
function deleteOrder(id) {
orders = orders.filter(o => o.id !== id);
localStorage.setItem("orders", JSON.stringify(orders));
displayOrders();
}

// 📦 DISPLAY
function displayOrders() {
const container = document.getElementById("orders");
container.innerHTML = "";

orders.forEach(o => {
container.innerHTML += `
<div class="order">
<b>${o.id}</b><br>
👤 ${o.name}<br>
🎂 ${o.cakeType}<br>
📏 ${o.size}<br>
💰 ₱${o.price}<br>
📅 ${o.date}<br>
❤️ ${o.status}<br><br>

<button onclick='deleteOrder("${o.id}")'>❌ Delete</button>
</div>
`;
});
}

displayOrders();

</script>

</body>
</html>
