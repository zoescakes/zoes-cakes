<!DOCTYPE html>
<html>
<head>
  <title>Zoe's Cakes 🎂</title>

  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom, #ffe4ec, #fff0f5);
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #ff4da6;
      font-family: 'Pacifico', cursive;
      font-size: 42px;
      text-shadow: 1px 1px 3px #ffc0cb;
    }

    .box {
      background: #ffffffcc;
      padding: 20px;
      border-radius: 15px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 4px 15px rgba(255,105,180,0.2);
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ffd6e8;
    }

    button {
      background: linear-gradient(45deg, #ff4da6, #ff85c1);
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .order {
      background: #fff;
      padding: 15px;
      margin: 12px 0;
      border-radius: 12px;
      border-left: 6px solid #ff85c1;
    }

    @media print {
      body * { visibility: hidden; }
      #printSection, #printSection * { visibility: visible; }
      #printSection {
        position: absolute;
        left: 0;
        top: 0;
        width: 58mm;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>

<h1>Zoe's Cakes 🎂</h1>

<div class="box">
  <input id="name" placeholder="Customer Name">
  <input id="cake" placeholder="Cake Type">
  <input id="size" placeholder="Size">
  <input id="price" placeholder="Price">
  <input id="date" type="date">

  <select id="status">
    <option>Pending</option>
    <option>Paid</option>
    <option>Claimed</option>
  </select>

  <button onclick="addOrder()">✨ Submit Order</button>
</div>

<h2>💰 Sales</h2>
<h3>Paid Today: ₱<span id="paidDaily">0</span></h3>
<h3>Paid Month: ₱<span id="paidMonthly">0</span></h3>
<h3>Claimed Today: ₱<span id="claimedDaily">0</span></h3>
<h3>Claimed Month: ₱<span id="claimedMonthly">0</span></h3>

<h2>🧁 Orders</h2>
<div id="orders"></div>

<div id="printSection"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCGJ_LtyRkZ3YzfxVIsfu2uQKQvhDOHSLg",
  authDomain: "zoes-cake-order-tracker.firebaseapp.com",
  projectId: "zoes-cake-order-tracker",
  storageBucket: "zoes-cake-order-tracker.firebasestorage.app",
  messagingSenderId: "123074129862",
  appId: "1:123074129862:web:58f5be0ed235691ec88cc7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔢 AUTO ORDER NUMBER
function generateOrderNo() {
  return "ZC-" + Date.now();
}

function addOrder() {
  const name = document.getElementById("name").value;
  const cake = document.getElementById("cake").value;
  const size = document.getElementById("size").value;
  const price = document.getElementById("price").value;
  const date = document.getElementById("date").value;
  const status = document.getElementById("status").value;

  if (!name || !cake || !price || !date) {
    alert("Fill all fields");
    return;
  }

  db.collection("orders").add({
    orderNo: generateOrderNo(),
    name, cake, size, price, date, status
  });
}

function deleteOrder(id) {
  db.collection("orders").doc(id).delete();
}

function printReceipt(o) {
  const section = document.getElementById("printSection");

  section.innerHTML = `
    <center>
      <b style="font-family:'Pacifico';font-size:16px;">Zoe's Cakes 🎂</b><br>
      ${o.orderNo}<br>
      ----------------------<br>
      ${o.name}<br>
      ${o.cake}<br>
      Size: ${o.size}<br>
      ----------------------<br>
      ₱${o.price}<br>
      ${o.status}<br>
      ${o.date}<br>
      ----------------------<br>
      Thank you! 💖
    </center>
  `;

  window.print();
}

db.collection("orders").onSnapshot(snapshot => {
  const ordersDiv = document.getElementById("orders");
  ordersDiv.innerHTML = "";

  let paidDaily = 0;
  let paidMonthly = 0;
  let claimedDaily = 0;
  let claimedMonthly = 0;

  const today = new Date().toISOString().slice(0,10);
  const thisMonth = today.slice(0,7);

  snapshot.forEach(doc => {
    const o = doc.data();

    if (o.status === "Paid") {
      if (o.date === today) paidDaily += Number(o.price);
      if (o.date.startsWith(thisMonth)) paidMonthly += Number(o.price);
    }

    if (o.status === "Claimed") {
      if (o.date === today) claimedDaily += Number(o.price);
      if (o.date.startsWith(thisMonth)) claimedMonthly += Number(o.price);
    }

    ordersDiv.innerHTML += `
      <div class="order">
        <b>${o.orderNo || ""}</b><br>
        👤 ${o.name}<br>
        🎂 ${o.cake}<br>
        📏 ${o.size}<br>
        💵 ₱${o.price}<br>
        📅 ${o.date}<br>
        💖 <b>${o.status}</b><br><br>

        <button onclick='printReceipt(${JSON.stringify(o)})'>🧾 Print</button>
        <button onclick="deleteOrder('${doc.id}')">❌ Delete</button>
      </div>
    `;
  });

  document.getElementById("paidDaily").innerText = paidDaily;
  document.getElementById("paidMonthly").innerText = paidMonthly;
  document.getElementById("claimedDaily").innerText = claimedDaily;
  document.getElementById("claimedMonthly").innerText = claimedMonthly;
});
</script>

</body>
</html>
