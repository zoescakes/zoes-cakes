<!DOCTYPE html>
<html>
<head>
<title>Zoe's Cakes 🎂</title>

<style>
body {
  font-family: Arial;
  background: #ffe4ec;
  padding: 20px;
}
h1 {
  text-align: center;
  color: #ff4da6;
}
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}
.card {
  background: white;
  padding: 10px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  text-align: center;
}
.card img {
  width: 100%;
  border-radius: 10px;
}
button {
  background: #ff4da6;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 10px;
}
select {
  padding: 5px;
  margin-top: 5px;
}
</style>
</head>

<body>

<h1>💖 Zoe's Cake Packages 💖</h1>

<div class="container">

<div class="card">
<img src="drip.jpg">
<h3>🎂 Drip Cake</h3>
<select>
<option>Small - ₱380</option>
<option>Medium - ₱580</option>
<option>Large - ₱700</option>
<option>Rectangle 8x12 - ₱850</option>
</select>
<button>Add Order</button>
</div>

<div class="card">
<img src="cupcake.jpg">
<h3>🧁 With Cupcake Package</h3>
<select>
<option>1 Tier (6x4) + 12 cupcakes - ₱1350</option>
<option>Mini Tier (7 & 5) + 12 cupcakes - ₱2350</option>
<option>Standard Tier (8 & 6) + 12 cupcakes - ₱2800</option>
</select>
<button>Add Order</button>
</div>

<div class="card">
<img src="mini.jpg">
<h3>🎀 Mini Tiered Cake</h3>
<select>
<option>Custom Price</option>
</select>
<button>Add Order</button>
</div>

<div class="card">
<img src="tiered.jpg">
<h3>🎉 Standard Tiered Cake</h3>
<select>
<option>Custom Price</option>
</select>
<button>Add Order</button>
</div>

<div class="card">
<img src="wedding.jpg">
<h3>💍 Wedding Cake</h3>
<select>
<option>Starting ₱3500</option>
</select>
<button>Add Order</button>
</div>

</div>

</body>
</html>
