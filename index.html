<!DOCTYPE html>
<html>
<head>
<title>Zoe's Cakes</title>

<style>
body {
    font-family: Arial;
    background: #ffd6e7;
    text-align: center;
}

.container {
    background: white;
    padding: 20px;
    margin: 20px auto;
    width: 350px;
    border-radius: 15px;
}

h1 { color: #ff4d94; }

input {
    width: 90%;
    padding: 10px;
    margin: 8px;
}

button {
    background: #ff4d94;
    color: white;
    padding: 10px;
    border: none;
    width: 95%;
    cursor: pointer;
}

img {
    width: 100%;
    border-radius: 10px;
    cursor: pointer;
}

.card {
    margin: 10px;
}
</style>
</head>

<body>

<h1>🎂 Zoe's Cakes</h1>

<!-- CAKE MENU -->
<div class="container">
<h2>Choose Cake</h2>

<div class="card">
<img src="drip.jpg" onclick="selectCake('Drip Cake')">
<p>Drip Cake</p>
</div>

<div class="card">
<img src="mini.jpg" onclick="selectCake('Mini Tiered Cake')">
<p>Mini Tiered Cake</p>
</div>

<div class="card">
<img src="tiered.jpg" onclick="selectCake('Tiered Cake')">
<p>Tiered Cake</p>
</div>

<div class="card">
<img src="cupcake.jpg" onclick="selectCake('Cake w/ Cupcakes')">
<p>Cake w/ Cupcakes</p>
</div>

<div class="card">
<img src="wedding.jpg" onclick="selectCake('Wedding Cake')">
<p>Wedding Cake</p>
</div>

</div>

<!-- ORDER FORM -->
<div class="container">
<h2>Order Your Cake 💖</h2>

<input id="name" placeholder="Your Name">
<input id="cake" placeholder="Cake Type">
<input id="size" placeholder="Size">
<input id="price" placeholder="Budget / Price">
<input id="date" type="date">

<button onclick="placeOrder()">Place Order</button>
</div>

<!-- ADMIN LOGIN -->
<div class="container">
<h2>Admin Login</h2>

<input id="user" placeholder="Username">
<input id="pass" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div id="admin" class="container" style="display:none;">
<h2>Orders</h2>
<div id="orders"></div>

<h3>Total Sales: ₱<span id="total">0</span></h3>
</div>

<script>

function selectCake(type){
    document.getElementById("cake").value = type;
}

function placeOrder(){
    let order = {
        name: document.getElementById("name").value,
        cake: document.getElementById("cake").value,
        size: document.getElementById("size").value,
        price: document.getElementById("price").value,
        date: document.getElementById("date").value
    };

    if(order.name=="" || order.cake==""){
        alert("Fill all fields!");
        return;
    }

    let orders = JSON.parse(localStorage.getItem("orders")) || [];
    orders.push(order);
    localStorage.setItem("orders", JSON.stringify(orders));

    alert("Order Saved!");

    document.querySelectorAll("input").forEach(i=>i.value="");
}

function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u=="admin" && p=="1234"){
        document.getElementById("admin").style.display="block";
        showOrders();
    } else {
        alert("Wrong login!");
    }
}

function showOrders(){
    let orders = JSON.parse(localStorage.getItem("orders")) || [];
    let list = "";
    let total = 0;

    orders.forEach((o,i)=>{
        total += Number(o.price)||0;

        list += `
        <p>
        ${o.name} | ${o.cake} | ${o.size} | ₱${o.price} | ${o.date}
        <button onclick="deleteOrder(${i})">❌</button>
        </p>`;
    });

    document.getElementById("orders").innerHTML = list;
    document.getElementById("total").innerText = total;
}

function deleteOrder(i){
    let orders = JSON.parse(localStorage.getItem("orders")) || [];
    orders.splice(i,1);
    localStorage.setItem("orders", JSON.stringify(orders));
    showOrders();
}

</script>

</body>
</html>
