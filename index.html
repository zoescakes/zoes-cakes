<!DOCTYPE html>
<html>
<head>
<title>Zoe's Cakes</title>

<style>
body { font-family: Calibre; background:#ffd6e7; margin:0; }
h1 { text-align:center; color:#ff4d94; }

.main { display:flex; height:95vh; }

.left { width:40%; padding:10px; overflow:auto; }
.right { width:60%; padding:10px; display:flex; flex-direction:column; gap:10px; }

.container {
background:white;
padding:15px;
border-radius:20px;
}

.cakes {
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

img {
width:100%;
border-radius:15px;
cursor:pointer;
}

input, select {
width:95%;
padding:10px;
margin:5px;
border-radius:10px;
}

button {
width:auto;
padding:8px;
margin:3px;
background:#ff4d94;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.order {
background:#fff0f5;
padding:8px;
margin:5px;
border-radius:10px;
}
</style>
</head>

<body>

<h1>🎂 Zoe's Cakes</h1>

<div class="main">

<!-- LEFT -->
<div class="left container">
<h3>Choose Cake</h3>

<div class="cakes">
<img src="drip.jpg" onclick="selectCake('Drip Cake')">
<img src="mini.jpg" onclick="selectCake('Mini Tiered')">
<img src="tiered.jpg" onclick="selectCake('Tiered Cake')">
<img src="cupcake.jpg" onclick="selectCake('With Cupcakes')">
<img src="wedding.jpg" onclick="selectCake('Wedding Cake')">
</div>
</div>

<!-- RIGHT -->
<div class="right">

<div class="container">
<h3>Order 💖</h3>

<input id="name" placeholder="Customer Name">
<input id="cake" placeholder="Cake Type" readonly>

<select id="size" onchange="autoPrice()">
<option value="">Size</option>
<option>Small</option>
<option>Medium</option>
<option>Large</option>
</select>

<input id="price" placeholder="Price" readonly>
<input id="date" type="date">

<select id="status">
<option>Pending</option>
<option>Paid</option>
<option>Claimed</option>
</select>

<h4>GCash: 09062070504</h4>

<button onclick="placeOrder()">Save Order</button>
<button onclick="previewOrder()">Preview Order</button>
</div>

<div class="container">
<h3>Sales Tracker</h3>

<h4>Total Sales: ₱<span id="total">0</span></h4>

<input id="search" placeholder="Search name..." oninput="showOrders()">

<div id="orders"></div>
</div>

</div>
</div>

<script>

function selectCake(type){
cake.value = type;
autoPrice();
}

function autoPrice(){
let p=0;

if(cake.value=="Drip Cake"){
if(size.value=="Small") p=380;
if(size.value=="Medium") p=580;
if(size.value=="Large") p=700;
}

if(cake.value=="With Cupcakes") p=1350;
if(cake.value=="Mini Tiered") p=2350;
if(cake.value=="Tiered Cake") p=2800;
if(cake.value=="Wedding Cake") p=3500;

price.value = p;
}

function placeOrder(){
let o={
name:name.value,
cake:cake.value,
price:price.value,
date:date.value,
status:status.value
};

let data=JSON.parse(localStorage.getItem("orders"))||[];
data.push(o);
localStorage.setItem("orders",JSON.stringify(data));

showOrders();
alert("Saved!");
}

function showOrders(){
let data=JSON.parse(localStorage.getItem("orders"))||[];
let html="";
let total=0;

data.forEach((o,i)=>{

if(o.name.toLowerCase().includes(search.value.toLowerCase())){

if(o.status=="Paid"){
total+=Number(o.price)||0;
}

html+=`
<div class="order">
${o.name} | ${o.cake} | ₱${o.price} | ${o.status}
<br>
<button onclick="markPaid(${i})">Paid</button>
<button onclick="markClaim(${i})">Claimed</button>
<button onclick="printOne(${i})">🧾</button>
<button onclick="deleteOrder(${i})">❌</button>
</div>`;
}
});

orders.innerHTML=html;
document.getElementById("total").innerText=total;
}

function markPaid(i){
let data=JSON.parse(localStorage.getItem("orders"))||[];
data[i].status="Paid";
localStorage.setItem("orders",JSON.stringify(data));
showOrders();
}

function markClaim(i){
let data=JSON.parse(localStorage.getItem("orders"))||[];
data[i].status="Claimed";
localStorage.setItem("orders",JSON.stringify(data));
showOrders();
}

function deleteOrder(i){
let data=JSON.parse(localStorage.getItem("orders"))||[];
data.splice(i,1);
localStorage.setItem("orders",JSON.stringify(data));
showOrders();
}

function previewOrder(){
let msg =
"🎂 Zoe's Cakes\n\n"+
name.value+"\n"+
cake.value+"\n₱"+price.value+"\n"+
date.value+"\nGCash: 09062070504";

alert(msg);
}

function printOne(i){
let data=JSON.parse(localStorage.getItem("orders"))||[];
let o=data[i];

let w=window.open("");
w.document.write(`
<h2>Zoe's Cakes</h2>
<p>${o.name}</p>
<p>${o.cake}</p>
<p>₱${o.price}</p>
<p>${o.status}</p>
<p>GCash: 09062070504</p>
`);
w.print();
}

showOrders();

</script>

</body>
</html>
