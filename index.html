<!DOCTYPE html>
<html>
<head>
<title>Zoe's Cakes 🎂</title>

<style>
body { font-family: Arial; background: #ffe4ec; padding: 20px; }
h1 { text-align: center; color: #ff4da6; }

.container {
  max-width: 420px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.card {
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  border: 2px solid transparent;
}

.card:hover {
  border: 2px solid #ff4da6;
}

.card img {
  width: 100%;
  height: 110px;
  object-fit: cover;
}

.card p {
  text-align: center;
  font-size: 12px;
  padding: 5px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
}

button {
  width: 100%;
  padding: 12px;
  background: #ff4da6;
  color: white;
  border: none;
  cursor: pointer;
  margin-top:5px;
}

.order {
  background: white;
  margin-top: 10px;
  padding: 10px;
  border-left: 5px solid pink;
}

.sales {
  margin-top:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>Zoe's Cakes 🎂</h1>

<div class="container">

<input id="name" placeholder="Customer Name">

<!-- 🎂 MENU -->
<div class="grid">

<div class="card" onclick="pick('small')">
<img src="images/drip.jpg">
<p>Drip Small ₱380</p>
</div>

<div class="card" onclick="pick('medium')">
<img src="images/drip.jpg">
<p>Drip Medium ₱580</p>
</div>

<div class="card" onclick="pick('large')">
<img src="images/drip.jpg">
<p>Drip Large ₱700</p>
</div>

<div class="card" onclick="pick('rect')">
<img src="images/rect.jpg">
<p>Rect ₱850</p>
</div>

<div class="card" onclick="pick('pkg1')">
<img src="images/cupcake.jpg">
<p>1 Tier ₱1350</p>
</div>

<div class="card" onclick="pick('pkg2')">
<img src="images/mini.jpg">
<p>Mini Tier ₱2350</p>
</div>

<div class="card" onclick="pick('pkg3')">
<img src="images/tiered.jpg">
<p>Standard ₱2800</p>
</div>

<div class="card" onclick="pick('wedding')">
<img src="images/wedding.jpg">
<p>Wedding ₱3500</p>
</div>

</div>

<input id="cakeType" placeholder="Cake Type">
<input id="size" placeholder="Size">
<input id="price" placeholder="Price">

<input id="date" type="date">

<select id="status">
<option>Pending</option>
<option>Paid</option>
<option>Claimed</option>
</select>

<button onclick="addOrder()">✨ Submit Order</button>

</div>

<div class="sales">
💰 Today Sales: ₱<span id="today">0</span><br>
💰 Monthly Sales: ₱<span id="month">0</span>
</div>

<h2>🧁 Orders</h2>
<div id="orders"></div>

<script>

let orders = JSON.parse(localStorage.getItem("orders")) || [];

function pick(pkg){

if(pkg==="small"){cakeType.value="Drip Cake";size.value="Small";price.value="380";}
if(pkg==="medium"){cakeType.value="Drip Cake";size.value="Medium";price.value="580";}
if(pkg==="large"){cakeType.value="Drip Cake";size.value="Large";price.value="700";}
if(pkg==="rect"){cakeType.value="Rectangular";size.value="8x12";price.value="850";}
if(pkg==="pkg1"){cakeType.value="1 Tier + 12 Cupcakes";size.value="6x4";price.value="1350";}
if(pkg==="pkg2"){cakeType.value="Mini Tiered";size.value="7 & 5";price.value="2350";}
if(pkg==="pkg3"){cakeType.value="Standard Tiered";size.value="8 & 6";price.value="2800";}
if(pkg==="wedding"){cakeType.value="Wedding Cake";size.value="2 Tier";price.value="3500";}

}

function addOrder(){
const order={
id:"ZC-"+Date.now(),
name:name.value,
cakeType:cakeType.value,
size:size.value,
price:parseInt(price.value),
date:date.value,
status:status.value
};

orders.push(order);
localStorage.setItem("orders",JSON.stringify(orders));
displayOrders();
}

function deleteOrder(id){
orders=orders.filter(o=>o.id!==id);
localStorage.setItem("orders",JSON.stringify(orders));
displayOrders();
}

function printOrder(o){
let w=window.open("","","width=300,height=600");
w.document.write(`
<h3 style="text-align:center;">🎂 Zoe's Cakes</h3>
<p>${o.id}</p>
<p>${o.name}</p>
<p>${o.cakeType}</p>
<p>${o.size}</p>
<p>₱${o.price}</p>
<p>${o.date}</p>
<p>${o.status}</p>
`);
w.print();
}

function displayOrders(){
const container=document.getElementById("orders");
container.innerHTML="";

let todayTotal=0;
let monthTotal=0;

const today=new Date().toISOString().split("T")[0];
const month=new Date().getMonth();

orders.forEach(o=>{

if(o.status==="Paid"){
if(o.date===today) todayTotal+=o.price;
if(new Date(o.date).getMonth()===month) monthTotal+=o.price;
}

container.innerHTML+=`
<div class="order">
<b>${o.id}</b><br>
👤 ${o.name}<br>
🎂 ${o.cakeType}<br>
📏 ${o.size}<br>
💰 ₱${o.price}<br>
📅 ${o.date}<br>
❤️ ${o.status}<br><br>

<button onclick='printOrder(${JSON.stringify(o)})'>🧾 Print</button>
<button onclick='deleteOrder("${o.id}")'>❌ Delete</button>
</div>
`;
});

document.getElementById("today").innerText=todayTotal;
document.getElementById("month").innerText=monthTotal;
}

displayOrders();

</script>

</body>
</html>
