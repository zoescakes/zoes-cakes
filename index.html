<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zoe's Cakes 👑</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#ffe6f0;margin:0}
h1{text-align:center;color:#ff4d94}

.main{display:flex}
.left{width:60%;padding:10px}
.right{width:40%;padding:10px;background:#fff0f5}

/* PRODUCTS */
.cakes{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

.product{
background:white;
border-radius:20px;
padding:10px;
text-align:center;
position:relative;
box-shadow:0 8px 20px rgba(255,77,148,0.2);
cursor:pointer;
transition:0.3s;
}
.product:hover{transform:scale(1.05)}

.product img{
width:100%;
height:120px;
object-fit:cover;
border-radius:15px;
}

.badge{
position:absolute;
top:10px;
left:10px;
background:#ff4d94;
color:white;
padding:3px 8px;
border-radius:10px;
font-size:12px;
}

.product.active{
border:2px solid #ff4d94;
box-shadow:0 0 10px #ff4d94;
}

/* DASHBOARD */
.dash-card{
background:white;
padding:10px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* CHART */
.chart-box{
background:white;
padding:15px;
border-radius:15px;
margin-top:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
#salesChart{
width:100% !important;
height:250px !important;
}

/* FORM */
input,select{
width:90%;
padding:10px;
margin:5px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px;
background:#ff4d94;
color:white;
border:none;
border-radius:8px;
margin:5px;
cursor:pointer;
}

.order{
background:white;
margin:5px;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<h1>🎂 Zoe's Cakes 👑</h1>

<div class="main">

<div class="left">

<!-- DASHBOARD -->
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:15px;">
<div class="dash-card"><h4>💰 Today</h4><h2 id="todaySales">0</h2></div>
<div class="dash-card"><h4>📅 Monthly</h4><h2 id="monthSales">0</h2></div>
<div class="dash-card"><h4>🧾 Orders</h4><h2 id="totalOrders">0</h2></div>
<div class="dash-card"><h4>🏆 Top Cake</h4><h2 id="topCake">-</h2></div>
</div>

<h3>Choose Cake</h3>

<div class="cakes">
<div class="product" onclick="selectCake(event,'Drip Cake')"><img src="./drip.jpg"><h4>🍫 Drip Cake</h4></div>
<div class="product" onclick="selectCake(event,'Mini Tiered')"><img src="./mini.jpg"><h4>🧁 Mini Tiered</h4></div>
<div class="product" onclick="selectCake(event,'Tiered Cake')"><img src="./tiered.jpg"><h4>🎂 Tiered Cake</h4></div>
<div class="product" onclick="selectCake(event,'Cupcake Set')"><img src="./cupcake.jpg"><h4>🧁 Cupcake Set</h4></div>
<div class="product" onclick="selectCake(event,'Wedding Cake')"><img src="./wedding.jpg"><h4>💍 Wedding Cake</h4></div>
</div>

<!-- CHART -->
<div class="chart-box">
<h3>📊 Sales Chart</h3>
<canvas id="salesChart"></canvas>
</div>

</div>

<div class="right">

<h3>Order</h3>

<input id="name" placeholder="Customer Name">
<input id="cake" placeholder="Cake">
<input id="size" placeholder="Size">
<input id="price" placeholder="Price">
<input type="date" id="date">

<select id="status">
<option>Pending</option>
<option>Paid</option>
<option>Claimed</option>
</select>

<button onclick="saveOrder()">Save</button>

<h3>Total Sales: ₱<span id="total">0</span></h3>

<div id="orders"></div>

</div>
</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSy...",
authDomain: "zoes-cake-order-tracker.firebaseapp.com",
projectId: "zoes-cake-order-tracker"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

date.value = new Date().toISOString().split('T')[0];

function selectCake(e,cake){
document.querySelectorAll(".product").forEach(p=>p.classList.remove("active"));
e.currentTarget.classList.add("active");
cakeInput().value = cake;
}

const nameInput=()=>document.getElementById("name");
const cakeInput=()=>document.getElementById("cake");
const priceInput=()=>document.getElementById("price");
const statusInput=()=>document.getElementById("status");

function saveOrder(){
db.collection("orders").add({
name:nameInput().value,
cake:cakeInput().value,
price:priceInput().value,
status:statusInput().value,
date:date.value
});
}

function load(){
db.collection("orders").onSnapshot(snap=>{
let total=0, todaySales=0, monthSales=0;
let allOrders=[], cakeCount={};

let today = new Date().toISOString().split('T')[0];
let currentMonth = today.slice(0,7);

snap.forEach(doc=>{
let o=doc.data();
allOrders.push(o);

if(o.status=="Paid"){
let p=Number(o.price||0);
total+=p;

if(o.date===today) todaySales+=p;
if(o.date && o.date.startsWith(currentMonth)) monthSales+=p;

cakeCount[o.cake]=(cakeCount[o.cake]||0)+1;
}
});

let topCake="-", max=0;
for(let c in cakeCount){
if(cakeCount[c]>max){max=cakeCount[c];topCake=c;}
}

document.getElementById("total").innerText=total;
document.getElementById("todaySales").innerText=todaySales;
document.getElementById("monthSales").innerText=monthSales;
document.getElementById("totalOrders").innerText=allOrders.length;
document.getElementById("topCake").innerText=topCake;

loadChart(allOrders);
});
}

let chart;

function loadChart(orders){
let sales={};

orders.forEach(o=>{
if(o.status!=="Paid") return;
let d=o.date||"No Date";
sales[d]=(sales[d]||0)+Number(o.price||0);
});

let labels=Object.keys(sales).sort();
let data=labels.map(d=>sales[d]);

let ctx=document.getElementById("salesChart").getContext("2d");

if(chart) chart.destroy();

chart=new Chart(ctx,{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Sales ₱",
data:data,
borderColor:"#ff4d94",
backgroundColor:"rgba(255,77,148,0.2)",
tension:0.4,
fill:true
}]
},
options:{
animation:{duration:1500},
scales:{y:{beginAtZero:true}}
}
});
}

load();

</script>

</body>
</html>
