<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zoe's Cakes 👑</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;background:#ffe6f0;margin:0}
h1{text-align:center;color:#ff4d94}

.main{display:flex}
.left{width:60%;padding:10px}
.right{width:40%;padding:10px;background:#fff0f5}

/* PRODUCTS */
.cakes{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

.product{
background:white;
border-radius:20px;
padding:10px;
text-align:center;
position:relative;
box-shadow:0 8px 20px rgba(255,77,148,0.2);
cursor:pointer;
transition:0.3s;
}
.product:hover{transform:scale(1.05)}

.product img{
width:100%;
height:120px;
object-fit:cover;
border-radius:15px;
}

.badge{
position:absolute;
top:10px;
left:10px;
background:#ff4d94;
color:white;
padding:3px 8px;
border-radius:10px;
font-size:12px;
}

.product.active{
border:2px solid #ff4d94;
box-shadow:0 0 10px #ff4d94;
}

/* FORM */
input,select{
width:90%;
padding:10px;
margin:5px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px;
background:#ff4d94;
color:white;
border:none;
border-radius:8px;
margin:5px;
cursor:pointer;
}

/* ORDERS */
.order{
background:white;
margin:5px;
padding:10px;
border-radius:10px;
}

/* RECEIPT PRINT */
@media print{
body *{visibility:hidden}
#printArea, #printArea *{visibility:visible}
#printArea{
position:absolute;
top:0;
left:0;
width:100%;
}
}
</style>
</head>

<body>

<h1>🎂 Zoe's Cakes 👑</h1>

<div class="main">

<!-- LEFT -->
<div class="left">

<h3>Choose Cake</h3>

<div class="cakes">

<div class="product" onclick="selectCake(event,'Drip Cake')">
<div class="badge">BEST SELLER</div>
<img src="./drip.jpg">
<h4>🍫 Drip Cake</h4>
</div>

<div class="product" onclick="selectCake(event,'Mini Tiered')">
<div class="badge">NEW</div>
<img src="./mini.jpg">
<h4>🧁 Mini Tiered</h4>
</div>

<div class="product" onclick="selectCake(event,'Tiered Cake')">
<img src="./tiered.jpg">
<h4>🎂 Tiered Cake</h4>
</div>

<div class="product" onclick="selectCake(event,'Cupcake Set')">
<img src="./cupcake.jpg">
<h4>🧁 Cupcake Set</h4>
</div>

<div class="product" onclick="selectCake(event,'Wedding Cake')">
<img src="./wedding.jpg">
<h4>💍 Wedding Cake</h4>
</div>

</div>

</div>

<!-- RIGHT -->
<div class="right">

<h3>Order</h3>

<input id="name" placeholder="Customer Name">
<input id="cake" placeholder="Cake">
<input id="size" placeholder="Size">
<input id="price" placeholder="Price">
<input type="date" id="date">

<select id="status">
<option>Pending</option>
<option>Paid</option>
<option>Claimed</option>
</select>

<button onclick="saveOrder()">Save</button>

<h3>Total Sales: ₱<span id="total">0</span></h3>

<h3>Orders</h3>
<div id="orders"></div>

</div>

</div>

<!-- RECEIPT AREA -->
<div id="printArea"></div>

<script>

// FIREBASE
const firebaseConfig = {
apiKey: "AIzaSyCGJ_LtyRkZ3YzfxVIsfu2uQKQvhDOHSLg",
authDomain: "zoes-cake-order-tracker.firebaseapp.com",
projectId: "zoes-cake-order-tracker"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// AUTO DATE
date.value = new Date().toISOString().split('T')[0];

// SELECT
function selectCake(e,cake){
document.querySelectorAll(".product").forEach(p=>p.classList.remove("active"));
e.currentTarget.classList.add("active");
cakeInput().value = cake;
priceInput().value="";
sizeInput().value="";
}

// INPUTS
const nameInput=()=>document.getElementById("name");
const cakeInput=()=>document.getElementById("cake");
const sizeInput=()=>document.getElementById("size");
const priceInput=()=>document.getElementById("price");
const statusInput=()=>document.getElementById("status");

// SAVE
function saveOrder(){
if(!nameInput().value || !cakeInput().value){
alert("Complete order!");
return;
}

db.collection("orders").add({
name:nameInput().value,
cake:cakeInput().value,
size:sizeInput().value,
price:priceInput().value,
status:statusInput().value,
date:date.value
});
}

// DELETE
function del(id){
db.collection("orders").doc(id).delete();
}

// UPDATE STATUS
function updateStatus(id,val){
db.collection("orders").doc(id).update({status:val});
}

// PRINT RECEIPT
function printRec(o){

// format price
let price = Number(o.price).toLocaleString("en-PH");

// generate simple receipt number
let recNo = Date.now().toString().slice(-6);

// status label
let statusLabel = o.status === "Paid" ? "PAID ✔" : "PENDING";

// date now
let now = new Date().toLocaleString();

let html=`
<div style="font-family:monospace; width:260px; padding:10px; line-height:1.6">

<center>
<b>Zoe's Cakes</b><br>
Poblacion Sawata<br>
Davao del Norte<br>
Philippines 8102<br>
09062070504
</center>

--------------------------------
Receipt No: ${recNo}
Date Print: ${now}
Status: ${statusLabel}
--------------------------------

Name:
${o.name}

Cake:
${o.cake}

Size:
${o.size}

--------------------------------

TOTAL:
₱${price}

--------------------------------

     Thank you! 💖
   Please come again ✨

</div>
`;

document.getElementById("printArea").innerHTML=html;
window.print();

}
// LOAD
function load(){
db.collection("orders").onSnapshot(snap=>{
let html="";
let total=0;

snap.forEach(doc=>{
let o=doc.data();

if(o.status=="Paid") total+=Number(o.price||0);

html+=`
<div class="order">
👤 ${o.name}<br>
🎂 ${o.cake}<br>
💸 ₱${o.price}<br>
📅 ${o.date}<br>

<select onchange="updateStatus('${doc.id}',this.value)">
<option ${o.status=="Pending"?"selected":""}>Pending</option>
<option ${o.status=="Paid"?"selected":""}>Paid</option>
<option ${o.status=="Claimed"?"selected":""}>Claimed</option>
</select>

<br>
<button onclick="printRec(${JSON.stringify(o).replace(/"/g,'&quot;')})">Print</button>
<button onclick="del('${doc.id}')">Delete</button>
</div>
`;
});

orders.innerHTML=html;
totalEl.innerText=total;
});
}

const orders=document.getElementById("orders");
const totalEl=document.getElementById("total");

load();

</script>

</body>
</html>
