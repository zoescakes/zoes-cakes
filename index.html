<!DOCTYPE html>
<html>
<head>
  <title>Zoe's Cakes 🎂</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #fff0f5;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #ff69b4;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }

    button {
      background: #ff69b4;
      color: white;
      border: none;
      cursor: pointer;
    }

    .order {
      background: white;
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>Zoe's Cake Orders 🎂</h1>

<div class="box">
  <input id="name" placeholder="Customer Name">
  <input id="cake" placeholder="Cake Type">
  <input id="size" placeholder="Size">
  <input id="price" placeholder="Price">
  <input id="date" type="date">

  <select id="status">
    <option>Pending</option>
    <option>Paid</option>
    <option>Claimed</option>
  </select>

  <button onclick="addOrder()">Submit Order</button>
</div>

<h2>Orders</h2>
<div id="orders"></div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCGJ_LtyRkZ3YzfxVIsfu2uQKQvhDOHSLg",
    authDomain: "zoes-cake-order-tracker.firebaseapp.com",
    projectId: "zoes-cake-order-tracker",
    storageBucket: "zoes-cake-order-tracker.firebasestorage.app",
    messagingSenderId: "123074129862",
    appId: "1:123074129862:web:58f5be0ed235691ec88cc7"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  function addOrder() {
    const name = document.getElementById("name").value;
    const cake = document.getElementById("cake").value;
    const size = document.getElementById("size").value;
    const price = document.getElementById("price").value;
    const date = document.getElementById("date").value;
    const status = document.getElementById("status").value;

    if (!name || !cake) {
      alert("Fill all fields");
      return;
    }

    db.collection("orders").add({
      name, cake, size, price, date, status
    });
  }

  function deleteOrder(id) {
    db.collection("orders").doc(id).delete();
  }

  function printOrder(o) {
    const w = window.open('', '', 'width=300,height=400');
    w.document.write(`
      <h3>Zoe's Cakes</h3>
      <p>${o.name}</p>
      <p>${o.cake}</p>
      <p>₱${o.price}</p>
      <p>${o.status}</p>
    `);
    w.print();
  }

  db.collection("orders").onSnapshot(snapshot => {
    const ordersDiv = document.getElementById("orders");
    ordersDiv.innerHTML = "";

    snapshot.forEach(doc => {
      const o = doc.data();
      ordersDiv.innerHTML += `
        <div class="order">
          ${o.name} - ${o.cake} - ₱${o.price} (${o.status})<br>
          <button onclick="printOrder(${JSON.stringify(o)})">Print</button>
          <button onclick="deleteOrder('${doc.id}')">Delete</button>
        </div>
      `;
    });
  });
</script>

</body>
</html>
