<!DOCTYPE html>
<html>
<head>
<title>Zoe's Cakes</title>

<style>
body {
    font-family: Calligraphy;
    background: linear-gradient(to right,#ffd6e7,#ffeaf4);
    margin:0;
}

h1 {
    text-align:center;
    color:#ff4d94;
}

.main {
    display:flex;
    height:95vh;
}

/* LEFT */
.left {
    width:40%;
    padding:10px;
    overflow:auto;
}

.cakes {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

img {
    width:100%;
    border-radius:15px;
    cursor:pointer;
}

/* RIGHT */
.right {
    width:60%;
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.container {
    background:white;
    padding:15px;
    border-radius:20px;
}

input, select {
    width:95%;
    padding:10px;
    margin:5px;
    border-radius:10px;
}

button {
    width:100%;
    padding:10px;
    background:#ff4d94;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>🎂 Zoe's Cakes</h1>

<div class="main">

<!-- LEFT -->
<div class="left container">
<h3>Choose Cake</h3>

<div class="cakes">
<img src="drip.jpg" onclick="selectCake('Drip Cake')">
<img src="mini.jpg" onclick="selectCake('Mini Tiered')">
<img src="tiered.jpg" onclick="selectCake('Tiered Cake')">
<img src="cupcake.jpg" onclick="selectCake('With Cupcakes')">
<img src="wedding.jpg" onclick="selectCake('Wedding Cake')">
</div>
</div>

<!-- RIGHT -->
<div class="right">

<div class="container">
<h3>Order Now 💖</h3>

<input id="name" placeholder="Your Name">
<input id="cake" placeholder="Cake Type" readonly>

<select id="size" onchange="autoPrice()">
<option value="">Size</option>
<option>Small</option>
<option>Medium</option>
<option>Large</option>
</select>

<input id="price" placeholder="Price" readonly>
<input id="date" type="date">

<h4>GCash Payment</h4>
<p>Send to: <b>09062070504 Cheryl Ann C</b></p>

<button onclick="sendOrder()">Submit Order</button>
</div>

</div>
</div>

<script>

function selectCake(type){
    document.getElementById("cake").value = type;
    autoPrice();
}

function autoPrice(){
    let cake = document.getElementById("cake").value;
    let size = document.getElementById("size").value;
    let p = 0;

    if(cake=="Drip Cake"){
        if(size=="Small") p=380;
        if(size=="Medium") p=580;
        if(size=="Large") p=700;
    }

    if(cake=="With Cupcakes") p=1350;
    if(cake=="Mini Tiered") p=2350;
    if(cake=="Tiered Cake") p=2800;
    if(cake=="Wedding Cake") p=3500;

    document.getElementById("price").value = p;
}

function sendOrder(){
    let name = document.getElementById("name").value;
    let cake = document.getElementById("cake").value;
    let size = document.getElementById("size").value;
    let price = document.getElementById("price").value;
    let date = document.getElementById("date").value;

    let message =
    "🎂 Zoe's Cakes Order\n\n" +
    "Name: " + name + "\n" +
    "Cake: " + cake + "\n" +
    "Size: " + size + "\n" +
    "Price: ₱" + price + "\n" +
    "Date: " + date + "\n\n" +
    "GCash: 09764183834";

    alert(message + "\n\n📌 Please screenshot or copy and send via Messenger.");
}

</script>

</body>
</html>
