<!DOCTYPE html>
<html>
<head>
<title>Zoe's Cakes 🎂</title>

<style>
body {
  font-family: Arial;
  background: #ffe4ec;
  padding: 20px;
}

h1 {
  text-align: center;
  color: #ff4da6;
}

.container {
  max-width: 400px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}

button {
  width: 100%;
  padding: 12px;
  background: #ff4da6;
  color: white;
  border: none;
  margin-top: 10px;
}

.order {
  background: white;
  margin-top: 10px;
  padding: 10px;
  border-left: 5px solid pink;
}
</style>

</head>

<body>

<h1>Zoe's Cake Orders 🎂</h1>

<div class="container">

<input id="name" placeholder="Customer Name">

<select id="package" onchange="selectPackage()">
  <option value="">🎂 Select Package</option>
  <option value="A">Package A - ₱1500</option>
  <option value="B">Package B - ₱2500</option>
  <option value="C">Package C - ₱3500</option>
</select>

<input id="cakeType" placeholder="Cake Type">
<input id="size" placeholder="Size">
<input id="price" placeholder="Price">

<input id="date" type="date">

<select id="status">
  <option>Pending</option>
  <option>Paid</option>
  <option>Claimed</option>
</select>

<button onclick="addOrder()">✨ Submit Order</button>

</div>

<h2>🧁 Orders</h2>
<div id="orders"></div>

<script>

let orders = [];

function selectPackage() {
  const pkg = document.getElementById("package").value;

  if (pkg === "A") {
    document.getElementById("cakeType").value = "1 Tier Cake";
    document.getElementById("size").value = "6x3";
    document.getElementById("price").value = "1500";
  }

  if (pkg === "B") {
    document.getElementById("cakeType").value = "2 Tier Cake with Cupcake";
    document.getElementById("size").value = "8x4 + 6x3";
    document.getElementById("price").value = "2500";
  }

  if (pkg === "C") {
    document.getElementById("cakeType").value = "3 Tier Premium Cake";
    document.getElementById("size").value = "10x4 + 8x4 + 6x3";
    document.getElementById("price").value = "3500";
  }
}

function addOrder() {

  const name = document.getElementById("name").value;
  const cakeType = document.getElementById("cakeType").value;
  const size = document.getElementById("size").value;
  const price = document.getElementById("price").value;
  const date = document.getElementById("date").value;
  const status = document.getElementById("status").value;

  const order = {
    name, cakeType, size, price, date, status
  };

  orders.push(order);

  displayOrders();
}

function displayOrders() {
  const container = document.getElementById("orders");
  container.innerHTML = "";

  orders.forEach(o => {
    container.innerHTML += `
      <div class="order">
        <b>${o.name}</b><br>
        🎂 ${o.cakeType}<br>
        📏 ${o.size}<br>
        💰 ₱${o.price}<br>
        📅 ${o.date}<br>
        ❤️ ${o.status}
      </div>
    `;
  });
}

</script>

</body>
</html>
